<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Timer</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header class="app-header">
        <h1>Painel do Apresentador</h1>
        <div class="header-actions">
            <button id="openPresenterBtn" class="btn primary"><i class="fas fa-external-link-alt"></i> Abrir Tela do
                Apresentador</button>
            <button id="themeToggleBtn" class="btn icon-btn"><i class="fas fa-moon"></i></button>
            <button id="settingsBtn" class="btn icon-btn"><i class="fas fa-cog"></i></button>
        </div>
    </header>

    <div class="modal-overlay hidden" id="settingsModalOverlay">
        <div class="settings-modal" id="settingsPanel">
            <div class="modal-header">
                <h3>Configurações e Temas</h3>
                <button id="closeSettingsBtn" class="btn icon-btn"><i class="fas fa-times"></i></button>
            </div>

            <!-- Mini Preview -->
            <div class="mini-preview-container" id="miniPreviewContainer">
                <div class="mini-preview-bg" id="miniPreviewBg"></div>
                <div class="mini-preview-content">
                    <div class="mini-preview-time" id="miniPreviewTime">00:00:00</div>
                    <div class="mini-preview-msg" id="miniPreviewMsg">Sua mensagem aqui</div>
                </div>
            </div>

            <div class="settings-grid">
                <div class="form-group">
                    <label>Cor de Fundo</label>
                    <input type="color" id="setBgColor" value="#000000">
                </div>
                <div class="form-group">
                    <label>Cor do Texto</label>
                    <input type="color" id="setTextColor" value="#ffffff">
                </div>
                <div class="form-group">
                    <label>Tamanho da Fonte (Tempo - cqw)</label>
                    <input type="range" id="setTimeSize" min="5" max="40" value="20">
                </div>
                <div class="form-group">
                    <label>Tamanho da Fonte (Mensagem - cqw)</label>
                    <input type="range" id="setMsgSize" min="2" max="15" value="5">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Imagem de Fundo</label>
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="text" id="setBgImage" placeholder="Cole a URL ou envie um arquivo local"
                            style="flex: 1;">
                        <input type="file" id="setBgImageFile" accept="image/*" style="display: none;">
                        <button class="btn secondary" onclick="document.getElementById('setBgImageFile').click()"
                            title="Escolher imagem do PC" style="white-space: nowrap;"><i class="fas fa-upload"></i>
                            Local</button>
                    </div>
                </div>
            </div>
            <div class="form-group" style="margin-top: 1.5rem;">
                <button id="applySettingsBtn" class="btn primary" style="width: 100%; justify-content: center;"><i
                        class="fas fa-check"></i> Aplicar e Salvar Padrão</button>
            </div>

            <div class="themes-section">
                <h4>Temas Personalizados</h4>
                <div class="theme-save-area">
                    <input type="text" id="newThemeName" placeholder="Nome do tema (ex: Culto Jovem)">
                    <button id="saveThemeBtn" class="btn secondary"><i class="fas fa-save"></i> Salvar Atual</button>
                </div>
                <div class="themes-list" id="themesList">
                    <!-- Temas renderizados aqui -->
                </div>
            </div>
        </div>
    </div>

    <main class="dashboard">
        <!-- Coluna Esquerda -->
        <section class="panel left-panel">
            <h2>Prévia</h2>
            <div class="preview-container" id="previewContainer">
                <div class="preview-bg" id="previewBg"></div>
                <div class="preview-content">
                    <div class="preview-name" id="previewName"></div>
                    <div class="preview-time" id="previewTime">00:00:00</div>
                    <div class="preview-message" id="previewMessage"></div>
                </div>
            </div>

            <div class="controls">
                <button class="btn control-btn" id="playPauseBtn" title="Play/Pause"><i
                        class="fas fa-play"></i></button>
                <button class="btn control-btn" id="stopBtn" title="Parar/Zerar"><i class="fas fa-stop"></i></button>
                <button class="btn control-btn" id="resetBtn" title="Reiniciar"><i class="fas fa-undo"></i></button>
            </div>
            <div class="time-adjust">
                <button class="btn small-btn" id="add1Min">+1 Min</button>
                <button class="btn small-btn" id="sub1Min">-1 Min</button>
                <button class="btn small-btn" id="add5Min">+5 Min</button>
            </div>

            <div class="lost-time-container">
                <i class="fas fa-exclamation-triangle" style="color: var(--danger);"></i>
                <span>Tempo Excedido Total: </span>
                <span id="lostTimeDisplay" class="lost-time-value">00:00</span>
                <button id="resetLostTimeBtn" class="btn icon-btn" title="Zerar Tempo Excedido"
                    style="padding: 0; margin-left: auto; font-size: 1rem;"><i class="fas fa-undo"></i></button>
            </div>

            <div class="staging-area">
                <h3>Próximo Tempo</h3>
                <div class="staged-info">
                    <div id="stagedName" class="staged-name">Nenhum selecionado</div>
                    <div id="stagedDuration" class="staged-duration">--:--:--</div>
                </div>
                <button id="pushStagedBtn" class="btn primary"
                    style="width: 100%; justify-content: center; margin-bottom: 0.5rem;" disabled><i
                        class="fas fa-upload"></i> Enviar para Tela</button>
                <div class="auto-start-toggle">
                    <input type="checkbox" id="autoStartCheck">
                    <label for="autoStartCheck" style="font-size: 0.85rem; cursor: pointer;">Iniciar automaticamente ao
                        fim do atual</label>
                </div>
            </div>
        </section>

        <!-- Coluna Central -->
        <section class="panel center-panel">
            <h2>Tempos</h2>
            <div class="bulk-add">
                <button id="showAddFormBtn" class="btn secondary"
                    style="width: 100%; justify-content: center; margin-bottom: 0.5rem;"><i class="fas fa-plus"></i>
                    Adicionar Tempo</button>
                <div id="addTimerForm"
                    style="display: none; background: var(--bg-color); border: 1px solid var(--border); padding: 1rem; border-radius: 8px; margin-bottom: 0.5rem; flex-direction: column; gap: 0.5rem;">
                    <div class="form-group">
                        <label style="font-size: 0.8rem; margin-bottom: -0.2rem;">Nome do Tempo</label>
                        <input type="text" id="newTimerName" placeholder="Ex: Pregação" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label style="font-size: 0.8rem; margin-bottom: -0.2rem;">Duração (MM:SS ou MM)</label>
                        <input type="text" id="newTimerDuration" placeholder="Ex: 45:00 ou 45" autocomplete="off">
                    </div>
                    <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                        <button id="confirmAddTimerBtn" class="btn primary" style="flex: 1; justify-content: center;"><i
                                class="fas fa-check"></i> Salvar</button>
                        <button id="cancelAddTimerBtn" class="btn danger" style="flex: 1; justify-content: center;"><i
                                class="fas fa-times"></i> Cancelar</button>
                    </div>
                </div>
            </div>
            <div class="timer-list" id="timerList">
                <!-- Items inseridos dinamicamente -->
            </div>
        </section>

        <!-- Coluna Direita -->
        <section class="panel right-panel">
            <h2>Mensagens</h2>
            <div class="message-input-area">
                <textarea id="customMessageInput" placeholder="Digite uma mensagem para o apresentador..."></textarea>
                <div style="display: flex; gap: 0.5rem; width: 100%; margin-bottom: 0.5rem;">
                    <button id="sendMessageBtn" class="btn primary" style="flex: 1;"><i class="fas fa-paper-plane"></i> Enviar</button>
                    <button id="blinkMessageBtn" class="btn warning" style="flex: 1;"><i class="fas fa-exclamation-triangle"></i> Piscar</button>
                </div>
                <div style="display: flex; gap: 0.5rem; width: 100%;">
                    <button id="saveQuickMsgBtn" class="btn secondary" style="flex: 1;" title="Salvar mensagem atual como rápida"><i class="fas fa-save"></i> Salvar Rápida</button>
                    <button id="clearMessageBtn" class="btn danger" style="flex: 1;"><i class="fas fa-eraser"></i> Limpar</button>
                </div>
            </div>
            <div class="preset-messages">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <h3 style="margin-bottom: 0;">Mensagens Salvas</h3>
                    <span style="font-size: 0.7rem; color: var(--text-muted);">(Shift+Click apaga)</span>
                </div>
                <div class="preset-list" id="presetList">
                    <!-- Mensagens salvas inseridas aqui -->
                </div>
            </div>
        </section>
    </main>
    <script src="js/script.js"></script>
</body>

</html>
